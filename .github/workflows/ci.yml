name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        # Preinstalled on ubuntu-latest, but install explicitly so this job
        # doesn't silently depend on runner-image contents.
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck over every tracked shell file
        run: |
          set -uo pipefail
          # Enumerate tracked shell files instead of hardcoding a file list, so
          # a not-yet-present agents/*/adapter.sh is picked up automatically
          # once it lands (and never fails this step by being globbed while
          # absent). The bin/ commands have no .sh extension, so they're named
          # explicitly alongside the *.sh glob.
          mapfile -t files < <(git ls-files '*.sh' 'bin/agent-init' 'bin/baseline')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::no tracked shell files found via 'git ls-files'"
            exit 1
          fi
          echo "Linting ${#files[@]} shell file(s):"
          printf '  %s\n' "${files[@]}"

          # SC1091 ("not following sourced files") is expected: precommit-gate.sh
          # and implement-issue-gate.sh source lib/project-gates.sh via a
          # dynamically resolved relative path shellcheck can't statically follow.
          #
          # --severity=warning drops style/info-level nits (shellcheck's lowest
          # two tiers, e.g. SC2015/SC2016/SC2295-class suggestions) so this gate
          # fails on real correctness findings (warning/error), not style.
          shellcheck --severity=warning -e SC1091 "${files[@]}"

  build-drift:
    name: build-drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild generated root docs and skills
        run: bash scripts/build.sh

      - name: Fail if generated docs or skills are out of date
        run: |
          set -uo pipefail
          rc=0

          # Root docs (agents/*/…): rendered from base/practices/*.md.
          if ! git diff --exit-code -- agents/claude/CLAUDE.md agents/codex/AGENTS.md agents/gemini/GEMINI.md; then
            echo "::error::agents/claude/CLAUDE.md, agents/codex/AGENTS.md, and/or agents/gemini/GEMINI.md are stale relative to base/practices/*.md. Run 'bash scripts/build.sh' locally and commit the regenerated file(s)."
            rc=1
          fi

          # Generated Claude skills: rendered from base/workflows/*.md. git diff
          # catches a modified tracked SKILL.md; git ls-files --others catches a
          # newly-rendered skill that was never committed (git diff is blind to
          # untracked files — the drift a rebuild-forgot most often produces).
          if ! git diff --exit-code -- agents/claude/skills; then
            echo "::error::agents/claude/skills/*/SKILL.md is stale relative to base/workflows/*.md. Run 'bash scripts/build.sh' locally and commit the regenerated file(s)."
            rc=1
          fi
          untracked="$(git ls-files --others --exclude-standard -- agents/claude/skills)"
          if [ -n "$untracked" ]; then
            echo "::error::rendered skill(s) were produced but not committed:"
            echo "$untracked"
            rc=1
          fi

          # 1:1 mapping: every workflow source has exactly one rendered skill and
          # every skill has a source, so nothing silently loses or orphans an artifact.
          for wf in base/workflows/*.md; do
            [ -e "$wf" ] || continue
            n="$(basename "$wf" .md)"
            [ "$n" = README ] && continue
            sk="agents/claude/skills/$n/SKILL.md"
            if [ ! -f "$sk" ]; then
              echo "::error::base/workflows/$n.md has no rendered skill at $sk"
              rc=1
            elif ! git ls-files --error-unmatch "$sk" >/dev/null 2>&1; then
              # Gitignore-immune: git ls-files --others (above) respects .gitignore, so
              # a rendered skill under an ignored path would slip past it. A tracked
              # check catches an ignored-and-uncommitted skill too.
              echo "::error::$sk exists but is not git-tracked (untracked or gitignored) — run 'bash scripts/build.sh' and commit it"
              rc=1
            fi
          done
          for sk in agents/claude/skills/*/SKILL.md; do
            [ -e "$sk" ] || continue
            n="$(basename "$(dirname "$sk")")"
            if [ ! -f "base/workflows/$n.md" ]; then
              echo "::error::skill '$n' has no source at base/workflows/$n.md (orphaned generated artifact)"
              rc=1
            fi
          done

          exit "$rc"

  skill-frontmatter:
    name: skill-frontmatter
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint SKILL.md frontmatter
        run: |
          set -uo pipefail
          shopt -s nullglob
          fail=0
          for f in agents/claude/skills/*/SKILL.md; do
            first_line="$(head -n1 "$f")"
            if [ "$first_line" != "---" ]; then
              echo "::error file=$f::does not start with a '---' YAML frontmatter delimiter"
              fail=1
              continue
            fi

            # Line number of the SECOND '---' (the block's closing delimiter).
            # '|| true' keeps a malformed file (no closing delimiter) from
            # tripping the job's default errexit before the check below can
            # report it cleanly.
            close_line="$(grep -n '^---$' "$f" | sed -n '2p' | cut -d: -f1)" || true
            if [ -z "$close_line" ]; then
              echo "::error file=$f::missing closing '---' for the frontmatter block"
              fail=1
              continue
            fi

            frontmatter="$(sed -n "2,$((close_line - 1))p" "$f")"
            for key in 'name:' 'description:' 'user-invocable:'; do
              if ! printf '%s\n' "$frontmatter" | grep -q "^${key}"; then
                echo "::error file=$f::frontmatter is missing required key '${key}'"
                fail=1
              fi
            done
          done
          exit "$fail"

  workflow-render:
    name: workflow-render
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Workflow body placeholders map to Claude tokens, body-only, fail-loud on unmapped (#16)
        run: bash scripts/check-workflow-render.sh

  gate-detector:
    name: gate-detector
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: repo-root detection surfaces the committed agents.toml gate
        run: |
          set -uo pipefail
          # The generic empty-ecosystem no-op (detect emits nothing) is covered by
          # check-gates.sh, run in this same job below — so it isn't repeated here. This step
          # asserts what is specific to THIS repo: the dogfooded agents.toml [gates] override
          # (#7) must keep being exercised, so CI can't silently stop testing the manifest.
          want="$(printf 'test\tbash scripts/selfcheck.sh')"
          got="$(bash scripts/lib/project-gates.sh detect . 2>/dev/null)"   # compare stdout only
          if [ "$got" != "$want" ]; then
            echo "::error::expected repo-root 'detect .' to emit the committed test gate; got: $got"
            exit 1
          fi

      - name: badcmd must exit non-zero (usage guard)
        run: |
          set -uo pipefail
          rc=0
          bash scripts/lib/project-gates.sh badcmd >/tmp/adb-badcmd.log 2>&1 || rc=$?
          if [ "$rc" -eq 0 ]; then
            echo "::error::'project-gates.sh badcmd' unexpectedly exited 0; expected a non-zero usage-error exit"
            cat /tmp/adb-badcmd.log
            exit 1
          fi

      - name: Install jq
        # jq drives exact package.json script detection; install it explicitly (rather
        # than lean on runner-image contents) so the jq-path tests actually exercise it.
        run: sudo apt-get install -y jq

      - name: Full gate-model behavior tests (detection, open set, N/A, path scope)
        run: bash scripts/check-gates.sh

  common-lib:
    name: common-lib
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unit-test the shared shell primitives
        run: bash scripts/check-common-lib.sh

  cleanup-enum:
    name: cleanup-enum
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: /cleanup remote enumeration must exclude the origin/HEAD symref (#38)
        run: bash scripts/check-cleanup-enum.sh

  baseline:
    name: baseline
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: End-to-end test bin/baseline currency classification
        run: bash scripts/check-baseline.sh

  precommit-gate:
    name: precommit-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stop-hook quality gate must fail loud on a missing library (#35)
        run: bash scripts/check-precommit-gate.sh

  implement-gate:
    name: implement-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        # The implement-issue gate parses gh JSON with jq; install it explicitly.
        run: sudo apt-get install -y jq

      - name: implement-issue Stop hook re-verifies PR state live + fails closed (#44)
        run: bash scripts/check-implement-gate.sh

  install-migration:
    name: install-migration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # fetch-depth: 0 → full history + origin/<default>, so the merge-base the pull
        # simulation installs from is present (a shallow clone has no merge-base).
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: A plain `git pull` must never dangle an installed symlink (#35)
        run: bash scripts/check-install-migration.sh

  install-guard:
    name: install-guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: A missing manifest source must make install.sh fail loud (#48)
        run: bash scripts/check-install-guard.sh

  fact-drift:
    name: fact-drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Canonical facts must be consistent across their consumer docs
        run: bash scripts/check-fact-drift.sh

  practice-index:
    name: practice-index
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Every practice must be indexed exactly once in 00-index.md
        run: bash scripts/check-practice-index.sh

  install-dry-run:
    name: install-dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Point HOME at a fresh temp dir
        # install.sh/uninstall.sh write into $HOME; overriding it keeps the
        # runner's real HOME untouched and every later step in this job sees
        # the same override.
        run: |
          set -euo pipefail
          tmp_home="$RUNNER_TEMP/adb-home"
          mkdir -p "$tmp_home"
          echo "HOME=$tmp_home" >> "$GITHUB_ENV"

      - name: Install jq
        # Preinstalled on ubuntu-latest, but install explicitly (install.sh's
        # hook-wiring step requires it) so this job doesn't silently depend on
        # runner-image contents.
        run: sudo apt-get install -y jq

      - name: Run install.sh for all three agents
        # Install claude + codex + gemini so the adapter paths (which now source the
        # shared scripts/lib/common.sh) are exercised alongside Claude's inline path.
        run: |
          set -euo pipefail
          ./install.sh --agent claude --agent codex --agent gemini

      - name: Assert key symlinks exist and resolve
        run: |
          set -euo pipefail
          for p in \
            "$HOME/.claude/CLAUDE.md" \
            "$HOME/.claude/skills/implement-issue" \
            "$HOME/.claude/scripts/precommit-gate.sh" \
            "$HOME/.claude/scripts/lib/project-gates.sh" \
            "$HOME/.claude/scripts/lib/common.sh" \
            "$HOME/.codex/AGENTS.md" \
            "$HOME/.gemini/GEMINI.md"; do
            if [ ! -e "$p" ]; then
              echo "::error::expected path to exist and resolve: $p"
              exit 1
            fi
          done

      - name: Assert Stop hook wired into settings.json
        run: |
          set -euo pipefail
          grep -q 'precommit-gate\.sh' "$HOME/.claude/settings.json"

      - name: Run uninstall.sh for all three agents
        run: |
          set -euo pipefail
          ./uninstall.sh --agent claude --agent codex --agent gemini

      - name: Assert root docs are no longer symlinks
        run: |
          set -euo pipefail
          for p in "$HOME/.claude/CLAUDE.md" "$HOME/.codex/AGENTS.md" "$HOME/.gemini/GEMINI.md"; do
            if [ -L "$p" ]; then
              echo "::error::$p is still a symlink after uninstall"
              exit 1
            fi
          done
